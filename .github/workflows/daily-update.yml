name: Daily plugin update

on:
  schedule:
    # GitHub Actions cron uses UTC. This runs at 00:00 Asia/Shanghai.
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests pycryptodome passlib pyelftools

      - name: Run update scripts
        run: |
          python ./download_plugin.py
          python ./download_all_file.py
          python ./unpack_plugins.py

      - name: Commit and push changes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore: update plugins"
            git push
          else
            echo "No changes to commit."
          fi
