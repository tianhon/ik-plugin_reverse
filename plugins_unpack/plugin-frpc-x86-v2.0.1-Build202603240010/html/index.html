<html>

<head>
  <script src="../../static/js/vue.js"></script>
  <script src="../../static/js/plugin.js"></script>
  <script src="../../static/js/element.js"></script>
  <link rel="stylesheet" href="../../static/css/plugin.css" type="text/css">
  <link rel="stylesheet" href="../../static/css/element.css">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
</head>

<body>
  <div id="app" class="wrapper row" v-loading="loading" :element-loading-text="loading_text">
    <div class="box clearfix">
      <div class="box_block">
        <div class="clearfix margin_phone col-lg-11 col-lg-offset-1 ">
          <div class="line_edit">
            <span class="input_tit">开机自启动：</span>
            <div class="input_group">
              <el-switch @change="set_auto_start" v-model="autostart"></el-switch>
            </div>
          </div>
          <div class="line_edit">
            <span class="input_tit">FRPC状态：</span>
            <div class="input_group">
              <span :class="statusClass">{{ statusMessage }}
            </div>
          </div>
          <div class="line_edit">
            <span class="input_tit">程序版本：</span>
            <div class="input_group">
              <span>{{ version }}
            </div>
          </div>
          <div class="line_edit">
            <span class="input_tit">配置文件：</span>
            <div class="input_group">
              <textarea class="inptText w420" style="height: 380px; max-height: 380px;" v-model="configTxt"></textarea>
            </div>
          </div>
          <div class="line_edit">
            <div class="input_group">
              <button type="submit" @click="save" :disabled="this.status === 2"
                class="btn btn_blue btn_confirm">保存配置</button>
              <button type="button" @click="start" :disabled="this.status === 2"
                class="btn btn_green btn_confirm">启动/重启FRPC</button>
              <button type="button" @click="stop" class="btn btn_red btn_confirm margin-l-10">停止FRPC</button>
            </div>
          </div>
          <div class="h20"></div>
          <div class="readme col-lg-11 col-xs-12">
            <span class="note">帮助提示：</span>
            <div>1、高级配置请参考FRPC官方文档。</div>
            <div>2、FRPC官方文档：<a target="_blank" href="https://gofrp.org/zh-cn/">https://gofrp.org/zh-cn/</a></div>
            <div>3、配置文件支持INI格式和TOML格式，默认参考配置为INI格式。</div>
          </div>
          <div class="h40"></div>
        </div>
      </div>
    </div>
  </div>
</body>
<script type="module">
  var app = new Vue({
    el: '#app',
    data: {
      autostart: false,
      configTxt: "",
      version: "未获取",
      status: 1,
      statusMessage: "",
      statusClass: "",
      loading: false,
      loading_text: "",
    },
    created() {
      this.loadInitData();
    },
    methods: {
      loadInitData() {
        self = this;
        var payload = {
          func_name: 'plugin_frpc',
          action: 'show',
          param: { TYPE: 'config' }
        };
        AjaxPost('/Action/call', payload, (response) => {
          if (response.Result % 10000 == 0 && response.Data) {

            const data = response.Data;
            if (data.config) {
              self.configTxt = decodeURIComponent(escape(atob(data.config)));
            }
            self.status = data.status;
            if (data.status === 1) {
              self.statusMessage = "已启动";
              self.statusClass = "colorG";
            } else if (data.status === 2) {
              self.statusMessage = "正在启动，请等待...";
              self.statusClass = "colorR";
              setTimeout(() => {
                self.loadInitData();
              }, 2000);
            } else {
              self.statusMessage = "已停止";
              self.statusClass = "colorR";
            }

            if (data.autostart === 1) {
              self.autostart = true;
            } else {
              self.autostart = false;
            }

            if (data.version) {
              self.version = data.version;
            } else {
              self.version = "未获取";
            }
          }
        });
      },
      set_auto_start() {
        var payload = {
          func_name: 'plugin_frpc',
          action: 'set_auto_start',
          param: { autostart: this.autostart }
        };
        AjaxPost('/Action/call', payload, (response) => {
          if (response.Result % 10000 == 0) {
            this.$message({ message: `FRPC已${this.autostart ? '设为开机自启动' : '取消开机自启动'}！`, type: 'success' });
          } else {
            this.autostart = !this.autostart;
          }
        });
      },
      save() {
        self = this;
        self.loading = true;
        self.loading_text = "正在保存...";

        if (!this.configTxt) {
          self.loading = false;
          self.$message.error('配置文件不能为空！');
          return;
        }

        var configTxt64 = btoa(unescape(encodeURIComponent(this.configTxt)));
        var payload = {
          func_name: 'plugin_frpc',
          action: 'save',
          param: { config: configTxt64 }
        };
        AjaxPost('/Action/call', payload, (response) => {
          if (response.Result % 10000 == 0) {
            self.loading = false;
            self.$message.success('保存配置成功！');
          }
          else {
            self.loading = false;
            self.$message.error(`保存配置出错！${response.ErrMsg}`);
          }
        });
      },

      start() {
        self = this;
        self.loading = true;
        self.loading_text = "正在启动...";
        var payload = {
          func_name: 'plugin_frpc',
          action: 'start',
          param: {}
        };
        AjaxPost('/Action/call', payload, (response) => {
          if (response.Result % 10000 == 0) {
            self.loading = false;
            self.statusMessage = "正在运行";
            self.statusClass = "colorG";
            self.$message.success('FRPC已启动！');
          }
          else {
            self.loading = false;
            self.$message.error(`启动FRPC失败！${response.ErrMsg}`);
          }
          setTimeout(() => {
            self.loadInitData();
          }, 500);

        });
      },
      stop() {
        self = this;
        self.loading = true;
        self.loading_text = "正在停止...";

        var payload = {
          func_name: 'plugin_frpc',
          action: 'stop',
          param: {}
        };
        AjaxPost('/Action/call', payload, (response) => {
          if (response.Result % 10000 == 0) {
            self.loading = false;
            self.statusMessage = "已停止运行";
            self.statusClass = "colorR";
            self.$message.success('FRPC已停止运行！');
          }
          else {
            self.loading = false;
            self.$message.error(`停止FRPC失败！${response.ErrMsg}`);
          }
          setTimeout(() => {
            self.loadInitData();
          }, 500);
        });
      }
    }
  });
</script>
<style scoped>
  button:disabled {
    color: #C0C4CC;
    background-color: #EFEFEF;
    cursor: not-allowed
  }
</style>

</html>
